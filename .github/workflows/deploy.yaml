name: Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      GOOS: js
      GOARCH: wasm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    env:
      GOOS: js
      GOARCH: wasm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Generate config
        run: |
          cat > config/config_defaults.yaml << EOF
          resolution: 900x750
          server_addr: game.gopl.dev
          secure: true
          volume: 1
          show_game_log: true
          auto_show_info_panel: true
          keybindings:
            move: M
            ability_1: Z
            ability_2: X
            ability_3: C
            ability_4: V
            show_game_log: L
            show_coordinates: AltLeft
            end_turn: Space
          EOF

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build client
        run: |
          GOOS=js GOARCH=wasm go build \
            -ldflags "-X 'github.com/goplease-game/client.Commit=${SHORT_SHA}' -X 'github.com/goplease-game/client.BuildDate=${BUILD_DATE}'" \
            -o asset/wasm/goplease.wasm cmd/game/main.go

      - name: Copy wasm_exec.js
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" asset/wasm/

      - name: Inject wasm hash into index.html
        run: |
          HASH=$(sha256sum asset/wasm/goplease.wasm | cut -c1-8)
          sed -i "s/goplease\.wasm/goplease.wasm?v=${HASH}/g" asset/wasm/game.html
          sed -i "s/game\.html/game.html?v=${HASH}/g" asset/wasm/index.html

      - name: Create archive
        run: tar -czf artifact.tar.gz -C asset/wasm .

      - name: Upload archive to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "artifact.tar.gz"
          target: "/tmp"

      - name: Unpack archive on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/goplease/home
            sudo tar -xzf /tmp/artifact.tar.gz -C /var/www/goplease/home
            sudo chown -R caddy:caddy /var/www/goplease/home
            sudo chmod -R 755 /var/www/goplease/home
            rm /tmp/artifact.tar.gz