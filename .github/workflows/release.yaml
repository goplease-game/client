name: Release Game

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # =================================================================
  # SHARED ASSETS: icons + config, built once and reused by all jobs
  # =================================================================
  prepare-assets:
    name: Generate icons and config
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Generate default configuration file
        run: |
          mkdir -p config
          cat > config/config_defaults.yaml << EOF
          resolution: 1000x750
          server_addr: gs.gopl.dev
          secure: true
          volume: 1
          show_game_log: true
          auto_show_info_panel: true
          keybindings:
            move: M
            ability_1: Z
            ability_2: X
            ability_3: C
            ability_4: V
            show_game_log: L
            show_coordinates: AltLeft
            end_turn: Space
          EOF

      - name: Generate platform-specific icons
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          pip install icnsutil

          mkdir -p iconset build/windows/winres

          for size in 16 32 128 256 512; do
            double=$((size * 2))
            convert build/icon-master.png -resize ${size}x${size} iconset/icon_${size}x${size}.png
            convert build/icon-master.png -resize ${double}x${double} iconset/icon_${size}x${size}@2x.png
          done

          python3 -m icnsutil compose build/macos/icon.icns \
            iconset/icon_16x16.png iconset/icon_16x16@2x.png \
            iconset/icon_32x32.png iconset/icon_32x32@2x.png \
            iconset/icon_128x128.png iconset/icon_128x128@2x.png \
            iconset/icon_256x256.png iconset/icon_256x256@2x.png \
            iconset/icon_512x512.png iconset/icon_512x512@2x.png
          
          
          # Windows ICO
          for size in 16 24 32 48 64 128 256; do
          convert build/icon-master.png \
          -resize ${size}x${size} \
          iconset/win_${size}x${size}.png
          done

          convert \
          iconset/win_16x16.png \
          iconset/win_24x24.png \
          iconset/win_32x32.png \
          iconset/win_48x48.png \
          iconset/win_64x64.png \
          iconset/win_128x128.png \
          iconset/win_256x256.png \
          build/windows/winres/icon.ico

          cp iconset/icon_256x256.png build/linux/icon.png

      # Bundle everything platform jobs need: config + generated icons
      - name: Upload shared assets
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: |
            config/config_defaults.yaml
            build/windows/winres/icon.ico
            build/macos/icon.icns
            build/linux/icon.png
          retention-days: 1

  # =================================================================
  # WINDOWS BUILD
  # =================================================================
  build-windows:
    name: Build Windows
    needs: prepare-assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build Windows Target
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          cd build/windows
          go-winres make
          cd ../..

          cp build/windows/*.syso cmd/game/

          mkdir -p dist/windows
          go build -ldflags "-s -w -X 'github.com/goplease-game/client.Commit=${SHORT_SHA}' -X 'github.com/goplease-game/client.BuildDate=${BUILD_DATE}'" -o dist/windows/goplease.exe ./cmd/game

          rm -f cmd/game/*.syso

          cd dist/windows
          zip -r ../../goplease_windows_amd64.zip goplease.exe
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goplease_windows_amd64
          path: goplease_windows_amd64.zip
          retention-days: 1

  # =================================================================
  # MACOS BUILD (native — runs on a real macOS runner, no cross-compile)
  # =================================================================
  build-macos:
    name: Build macOS
    needs: prepare-assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build macOS Target (.app bundle)
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 1 # native build — Xcode's clang handles amd64/arm64 out of the box
        run: |
          APP_DIR="dist/macos/goplease.app/Contents"
          mkdir -p "$APP_DIR/MacOS"
          mkdir -p "$APP_DIR/Resources"

          go build -ldflags "-s -w -X 'github.com/goplease-game/client.Commit=${SHORT_SHA}' -X 'github.com/goplease-game/client.BuildDate=${BUILD_DATE}'" -o "$APP_DIR/MacOS/goplease" cmd/game/main.go

          cp build/macos/Info.plist "$APP_DIR/"
          cp build/macos/icon.icns "$APP_DIR/Resources/"

          cd dist/macos
          zip -r ../../goplease_macos_amd64.zip goplease.app
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goplease_macos_amd64
          path: goplease_macos_amd64.zip
          retention-days: 1

  # =================================================================
  # LINUX BUILD
  # =================================================================
  build-linux:
    name: Build Linux
    needs: prepare-assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Linux graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev libxxf86vm-dev

      - name: Download shared assets
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build Linux Target
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 1
        run: |
          mkdir -p dist/linux/goplease_linux

          go build -ldflags "-s -w -X 'github.com/goplease-game/client.Commit=${SHORT_SHA}' -X 'github.com/goplease-game/client.BuildDate=${BUILD_DATE}'" -o dist/linux/goplease_linux/goplease cmd/game/main.go

          cp build/linux/icon.png dist/linux/goplease_linux/
          cp build/linux/goplease.desktop dist/linux/goplease_linux/

          cd dist/linux
          tar -czf ../../goplease_linux_amd64.tar.gz goplease_linux
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goplease_linux_amd64
          path: goplease_linux_amd64.tar.gz
          retention-days: 1

  # =================================================================
  # WASM
  # =================================================================
  build-wasm:
    name: Build WASM
    needs: prepare-assets
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set build metadata
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Build WASM Target Archive
        env:
          GOOS: js
          GOARCH: wasm
        run: |
          go build -ldflags "-s -w -X 'github.com/goplease-game/client.Commit=${SHORT_SHA}' -X 'github.com/goplease-game/client.BuildDate=${BUILD_DATE}'" -o asset/wasm/goplease.wasm cmd/game/main.go

          cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" asset/wasm/

          HASH=$(sha256sum asset/wasm/goplease.wasm | cut -c1-8)
          sed -i "s/goplease\.wasm/goplease.wasm?v=${HASH}/g" asset/wasm/game.html
          sed -i "s/game\.html/game.html?v=${HASH}/g" asset/wasm/index.html

          tar -czf goplease_wasm.tar.gz -C asset/wasm .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: goplease_wasm
          path: goplease_wasm.tar.gz
          retention-days: 1

  # =================================================================
  # PUBLISH — waits for all platform builds, then creates the release
  # =================================================================
  release:
    name: Publish GitHub Release
    needs: [build-windows, build-macos, build-linux, build-wasm]
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-artifacts/goplease_windows_amd64/goplease_windows_amd64.zip
            dist-artifacts/goplease_macos_amd64/goplease_macos_amd64.zip
            dist-artifacts/goplease_linux_amd64/goplease_linux_amd64.tar.gz
            dist-artifacts/goplease_wasm/goplease_wasm.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}