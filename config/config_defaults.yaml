# Window size
resolution: 1000x750

# Server address to connect to
# See https://github.com/goplease-game/server
server_addr: localhost:8090
secure: false

# Sound volume
volume: 1

show_game_log: true
auto_show_info_panel: true

skip_tutorial: false
tutorials_completed: []

keybindings:
  move: M
  ability_1: Z
  ability_2: X
  ability_3: C
  ability_4: V
  show_game_log: L
  show_coordinates: AltLeft
  end_turn: Space

# Developer mode
dev_mode:
  enabled: false
  # Use a local mock server instead of the real one
  mock_client: false
  # Log all communication between the client and server into ./protocol_log.txt
  # for troubleshooting/investigation
  log_protocol: false